apiVersion: v1
kind: Namespace
metadata:
  name: churn-model
---
apiVersion: v1
kind: Secret
metadata:
  name: s3-secret
  namespace: churn-model
  annotations:
    serving.kserve.io/s3-endpoint: s3.amazonaws.com
    serving.kserve.io/s3-usehttps: "1"
    serving.kserve.io/s3-region: us-east-1
    argocd.argoproj.io/sync-options: Skip=true
type: Opaque
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-s3-access
  namespace: churn-model
secrets:
  - name: s3-secret
