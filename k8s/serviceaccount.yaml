apiVersion: v1
kind: Namespace
metadata:
  name: churn-model
---
# IMPORTANT: This secret is NOT created from this file.
# Create it manually with kubectl BEFORE applying inference.yaml:
#
#   kubectl create secret generic az-secret \
#     --namespace churn-model \
#     --from-literal=AZURE_STORAGE_CONNECTION_STRING="<your-connection-string>"
#
# This keeps the actual token out of Git.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-az-access
  namespace: churn-model
secrets:
  - name: az-secret
