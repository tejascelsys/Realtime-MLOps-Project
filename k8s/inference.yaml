apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: churn-predictor
  namespace: churn-model
spec:
  predictor:
    serviceAccountName: sa-az-access
    model:
      modelFormat:
        name: sklearn
      # storageUri is injected by GitHub Actions from the AZURE_STORAGE_SAS_TOKEN secret.
      # Do not hardcode the SAS token here.
      storageUri: "https://storageaccountmlopspoc.blob.core.windows.net/models-container/models/PLACEHOLDER_REPLACED_BY_CI"
