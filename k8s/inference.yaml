apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: churn-predictor
  namespace: churn-model
  # storageUri is injected by GitHub Actions as the model path (no SAS token in Git).
spec:
  predictor:
    serviceAccountName: sa-az-access
    model:
      modelFormat:
        name: sklearn
      storageUri: "https://storageaccountmlopspoc.blob.core.windows.net/models-container/models/c744c70de5542d2cf2c515486790f2435550dabd/"
