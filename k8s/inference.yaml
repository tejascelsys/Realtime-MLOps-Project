apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: churn-predictor
  namespace: churn-model
  # storageUri is injected by GitHub Actions as the model path (no SAS token in Git).
spec:
  predictor:
    serviceAccountName: sa-az-access
    model:
      modelFormat:
        name: sklearn
      storageUri: "https://storageaccountmlopspoc.blob.core.windows.net/models-container/models/7fe732c9b6427a3a1b1a69d4f3d21b27175a06ca/"
      # Pass Azure credentials to KServe's storage-initializer (used when `storageUri` does not embed SAS).
      env:
        - name: AZURE_STORAGE_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: az-secret
              key: AZURE_STORAGE_CONNECTION_STRING
