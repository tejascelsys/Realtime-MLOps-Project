---
# ─── MLflow Storage PVC ───
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-storage-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
# ─── MLflow Deployment ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: monitoring
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.12.1
          args:
            - mlflow
            - server
            - --host=0.0.0.0
            - --port=5001
            - --backend-store-uri=sqlite:////mlflow/mlflow.db
            - --default-artifact-root=/mlflow/artifacts
          ports:
            - containerPort: 5001
          volumeMounts:
            - name: storage
              mountPath: /mlflow
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: mlflow-storage-pvc

---
# ─── MLflow Service ───
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: monitoring
  labels:
    app: mlflow
spec:
  type: ClusterIP
  ports:
    - port: 5001
      targetPort: 5001
      protocol: TCP
  selector:
    app: mlflow
