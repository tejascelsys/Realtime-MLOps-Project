---
# ─── Namespace ───
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app: monitoring

---
# ─── Prometheus Storage PVC ───
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-storage-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# ─── Prometheus ConfigMap ───
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alerting_rules.yml

    scrape_configs:
      # Scrape Prometheus itself
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Scrape ChurnShield proxy server metrics
      - job_name: 'churnshield'
        scrape_interval: 10s
        static_configs:
          - targets: ['churnshield-ui.monitoring.svc.cluster.local:5000']
            labels:
              app: 'churnshield'
              environment: 'demo'
        metrics_path: '/metrics'
  
  alerting_rules.yml: |
    groups:
      - name: churnshield_alerts
        rules:
          - alert: InstanceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Instance {{ $labels.instance }} down"
              description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute."

          - alert: HighErrorRate
            expr: rate(churnshield_prediction_errors_total[1m]) / rate(churnshield_prediction_requests_total[1m]) > 0.05
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "High Prediction Error Rate"
              description: "More than 5% of predictions are failing over the last minute."

          - alert: HighLatency
            expr: histogram_quantile(0.99, rate(churnshield_prediction_latency_seconds_bucket[5m])) > 2.0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High p99 Prediction Latency"
              description: "The 99th percentile of prediction latency is > 2 seconds for 2 minutes."


---
# ─── Prometheus Deployment ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=7d'
            - '--web.enable-lifecycle'
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: storage
              mountPath: /prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: storage
          persistentVolumeClaim:
            claimName: prometheus-storage-pvc

---
# ─── Prometheus Service ───
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: prometheus
