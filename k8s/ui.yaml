---
# ─── Metrics PVC ───
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: metrics-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# ─── UI Deployment ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: churnshield-ui
  namespace: monitoring
  labels:
    app: churnshield-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: churnshield-ui
  template:
    metadata:
      labels:
        app: churnshield-ui
    spec:
      volumes:
        - name: metrics-data
          persistentVolumeClaim:
            claimName: metrics-pvc
        - name: reports-data
          emptyDir: {}
      containers:
        # Main UI Proxy Container (Full monitoring suite)
        - name: churnshield-ui
          image: churnshield-ui:latest
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: reports-data
              mountPath: /app/monitoring/reports
            - name: metrics-data
              mountPath: /tmp/prometheus_metrics
          env:
            - name: PROMETHEUS_MULTIPROC_DIR
              value: "/tmp/prometheus_metrics"
            - name: DATA_ROOT
              value: "/app"
            - name: REPORTS_ROOT
              value: "/app/monitoring/reports"
            - name: KSERVE_ENDPOINT
              value: "http://10.96.156.204/v1/models/churn-predictor:predict"
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10

---
# ─── UI Service ───
apiVersion: v1
kind: Service
metadata:
  name: churnshield-ui
  namespace: monitoring
  labels:
    app: churnshield-ui
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
  selector:
    app: churnshield-ui
