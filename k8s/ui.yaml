---
# ─── UI Deployment ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: churnshield-ui
  namespace: monitoring
  labels:
    app: churnshield-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: churnshield-ui
  template:
    metadata:
      labels:
        app: churnshield-ui
    spec:
      volumes:
        - name: sync-data
          emptyDir: {}
      containers:
        # 1. The git-sync Sidecar Container
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v3.6.5
          volumeMounts:
            - name: sync-data
              mountPath: /tmp/git
          env:
            - name: GIT_SYNC_REPO
              value: "https://github.com/tejascelsys/Realtime-MLOps-Project.git"
            - name: GIT_SYNC_BRANCH
              value: "main"
            - name: GIT_SYNC_DEPTH
              value: "1"
            - name: GIT_SYNC_DEST
              value: "repo"
            - name: GIT_SYNC_WAIT
              value: "10" # Polling interval in seconds
          resources:
            requests:
              cpu: 50m
              memory: 64Mi

        # 2. The Main UI Proxy Container
        - name: churnshield-ui
          image: churnshield-ui:latest
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: sync-data
              mountPath: /sync
          env:
            - name: DATA_ROOT
              value: "/sync/repo"
            - name: KSERVE_ENDPOINT
              value: "http://churn-predictor-predictor.churn-model.svc.cluster.local/v1/models/churn-predictor:predict"
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

---
# ─── UI Service ───
apiVersion: v1
kind: Service
metadata:
  name: churnshield-ui
  namespace: monitoring
  labels:
    app: churnshield-ui
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
  selector:
    app: churnshield-ui
