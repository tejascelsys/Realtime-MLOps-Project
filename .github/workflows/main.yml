name: MLOps Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_STORAGE_ACCOUNT: storageaccountmlopspoc
  AZURE_STORAGE_CONTAINER: models-container

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push commits
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}  # Use built-in token
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Generate dataset
      run: python generate_data.py
    
    - name: Train model
      run: python train.py
    
    - name: Push model to Azure Blob directly
      run: |
        az storage blob upload \
          --account-name ${{ env.AZURE_STORAGE_ACCOUNT }} \
          --container-name ${{ env.AZURE_STORAGE_CONTAINER }} \
          --file models/churn_model.pkl \
          --name models/churn_model.pkl \
          --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
        echo "Model pushed to Azure Blob successfully"
    
    - name: Update inference.yaml with Azure model path
      run: |
        MODEL_URI="https://${{ env.AZURE_STORAGE_ACCOUNT }}.blob.core.windows.net/${{ env.AZURE_STORAGE_CONTAINER }}/models/"
        sed -i "s|storageUri: .*|storageUri: $MODEL_URI|g" k8s/inference.yaml
    
    - name: Commit updated inference.yaml
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add k8s/inference.yaml
        git commit -m "Update model Azure Blob path [skip ci]" || echo "No changes"
        git push || echo "No changes to push"
