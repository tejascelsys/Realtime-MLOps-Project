name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'params.yaml'
      - '**/*.py'
      - 'dvc.yaml'
      - 'requirements.txt'
  workflow_dispatch:

env:
  AZURE_STORAGE_ACCOUNT: storageaccountmlopspoc
  AZURE_STORAGE_CONTAINER: models-container
  MLFLOW_TRACKING_URI: file:./mlruns

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push commits
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}  # Use built-in token
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Run DVC Pipeline and Push
      id: dvc
      env:
        AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
      run: |
        dvc remote modify myremote connection_string "$AZURE_STORAGE_CONNECTION_STRING"
        dvc pull || echo "No cache yet"
        dvc repro
        
        # Evaluate model performance before pushing
        python scripts/evaluate_metrics.py 5.0
        
        dvc push
        
        # Check if dvc.lock changed
        if git diff --name-only | grep -q 'dvc.lock'; then
          echo "MODEL_CHANGED=true" >> $GITHUB_ENV
        else
          echo "MODEL_CHANGED=false" >> $GITHUB_ENV
        fi
    
    - name: Push model to Azure Blob directly
      if: env.MODEL_CHANGED == 'true'
      run: |
        az storage blob upload \
          --account-name ${{ env.AZURE_STORAGE_ACCOUNT }} \
          --container-name ${{ env.AZURE_STORAGE_CONTAINER }} \
          --file models/churn_model.pkl \
          --name models/${{ github.sha }}/churn_model.pkl \
          --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
          --overwrite
        echo "Model pushed to Azure Blob at models/${{ github.sha }}/churn_model.pkl"
    
    - name: Update inference.yaml with Azure model path
      if: env.MODEL_CHANGED == 'true'
      run: |
        MODEL_URI="https://${{ env.AZURE_STORAGE_ACCOUNT }}.blob.core.windows.net/${{ env.AZURE_STORAGE_CONTAINER }}/models/${{ github.sha }}/"
        python3 scripts/update_yaml.py "$MODEL_URI"
        echo "storageUri updated to: $MODEL_URI"
    
    - name: Commit updated files
      if: env.MODEL_CHANGED == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add k8s/inference.yaml dvc.lock metrics.json params.yaml dvc.yaml
        git commit -m "Update DVC pipeline and model Azure Blob path [skip ci]" || echo "No changes"
        git push || echo "No changes to push"
